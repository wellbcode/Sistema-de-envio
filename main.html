<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Um site de para verificar o envio de crachás.">
  <meta name="author" content="Wellington Bertoso Santos" data="01/04/2025">
  <meta name="Keywords" content="Crachás, html, CSS, Javascript,">
  <link rel="shortcut icon" href="./img/logo_itau_varejo_92x92.png" type="image/x-icon">
  <!-- <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" /> -->
   <!-- Bibliotecas externas -->
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- <link rel="stylesheet" href="./css/step.css"> -->
  <link rel="stylesheet" href="./css/step.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <title>Interface de busca</title>
</head>
<body>
  <div class="upload-container">
      <input type="file" id="uploadExcel"/>  
        <br>
     <select id="selectPessoa">
        <option value="">Selecione a pessoa</option>
      </select>
  </div>

<main>
    <div class="main-container">
      <img src="" alt="" class="crachas" id="fotoPessoa"/>
      <!-- <img id="fotoPessoa" src="" alt="Foto da pessoa" style="max-width: 200px; display: none; border-radius: 50%;" /> -->
       
      <ul>
        <li>
          <i class="icon uil uil-file-check-alt"></i>
          <div class="progress one">
            <p>1</p>
            <i class="uil uil-check"></i>
          </div>
          <p class="text">Coletado</p>
          <p class="text" id="coletado"></p>
        </li>
 
        <li>
          <i class="icon uil uil-clock"></i>
          <div class="progress two">
            <p>2</p>
            <i class="uil uil-check"></i>
          </div>
          <p class="text">Em preparação</p>
          <p class="text" id="preparacao"></p>
        </li>
 
        <li>
          <i class="icon uil uil-selfie"></i>
          <div class="progress three">
            <p>3</p>
            <i class="uil uil-check"></i>
          </div>
          <p class="text">Confeccionado</p>
          <p class="text" id="confeccionado"></p>
        </li>
 
        <li>
          <i class="icon uil uil-truck-loading"></i>
          <div class="progress four">
            <p>4</p>
            <i class="uil uil-check"></i>
          </div>
          <p class="text">Enviado</p>
          <p class="text" id="enviado"></p>
        </li>
 
        <li>
          <i class="icon truck uil uil-truck"></i>
          <div class="progress five">
            <p>5</p>
            <i class="uil uil-check"></i>
          </div>
          <p class="text">Em trânsito</p>
          <p class="text" id="transito"></p>
        </li>
 
        <li>
          <i class="icon uil uil-house-user"></i>
          <div class="progress six">
            <p>6</p>
            <i class="uil uil-check"></i>
          </div>
          <p class="text">Entregue</p>
          <p class="text" id="entregue"></p>
        </li>
      </ul>
    </div>
</main>
 
<script src="./js/dados.js"></script>
<script src="./js/indicador.js"></script>

</body>
</html>
